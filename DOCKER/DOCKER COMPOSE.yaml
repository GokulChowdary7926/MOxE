# docker/docker-compose.yml

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: moxe_postgres
    environment:
      POSTGRES_DB: moxe
      POSTGRES_USER: moxe_user
      POSTGRES_PASSWORD: moxe_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - moxe_network

  redis:
    image: redis:7-alpine
    container_name: moxe_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - moxe_network

  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: moxe_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - moxe_network

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: moxe_backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://moxe_user:moxe_password@postgres:5432/moxe
      REDIS_URL: redis://redis:6379
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: your_jwt_secret_here
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
      - elasticsearch
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - moxe_network

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: moxe_frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_WS_URL: ws://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - moxe_network

  nginx:
    image: nginx:alpine
    container_name: moxe_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - moxe_network

networks:
  moxe_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  backend_uploads: