name: Test

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACKEND
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: BACKEND/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test:unit -- --coverage

  backend-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACKEND
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: moxe
          POSTGRES_PASSWORD: moxe
          POSTGRES_DB: moxe_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U moxe -d moxe_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://moxe:moxe@localhost:5432/moxe_test
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: BACKEND/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:e2e

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FRONTEND
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: FRONTEND/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test -- --coverage

  frontend-playwright:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FRONTEND
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: FRONTEND/package-lock.json
      - run: npm ci
      - run: npm run check:mock-imports
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true
