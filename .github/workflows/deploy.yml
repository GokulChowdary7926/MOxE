name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: BACKEND
        run: npm ci

      - name: Backend TypeScript check
        working-directory: BACKEND
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        working-directory: FRONTEND
        run: npm ci

      - name: Frontend TypeScript check
        working-directory: FRONTEND
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: FRONTEND
        run: npm run build

  deploy-backend:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && secrets.RENDER_DEPLOY_HOOK_URL != '' && secrets.VAPID_PUBLIC_KEY != '' && secrets.VAPID_PRIVATE_KEY != ''
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: FRONTEND
          vercel-args: '--prod'

