name: CI and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: BACKEND
        run: npm ci

      - name: Backend TypeScript check
        working-directory: BACKEND
        run: npx tsc --noEmit

      - name: Install frontend dependencies
        working-directory: FRONTEND
        run: npm ci

      - name: Frontend TypeScript check
        working-directory: FRONTEND
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: FRONTEND
        run: npm run build

  deploy-backend:
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Require VAPID secrets for Web Push (backend)
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          if [ -z "$VAPID_PUBLIC_KEY" ] || [ -z "$VAPID_PRIVATE_KEY" ]; then
            echo "::error::Add repository secrets VAPID_PUBLIC_KEY and VAPID_PRIVATE_KEY before deploying the API (see docs/PUSH_NOTIFICATIONS.md)."
            exit 1
          fi
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "Render hook not configured"

  deploy-frontend:
    needs: test-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: FRONTEND
          vercel-args: '--prod'

