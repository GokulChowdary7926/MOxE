services:
  - type: web
    name: moxe-backend
    env: node
    plan: starter
    buildCommand: cd BACKEND && npm install && npm run build
    startCommand: cd BACKEND && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: moxe-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: "mailto:admin@moxe.app"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: CDN_BASE_URL
        sync: false
      - key: ALGOLIA_APP_ID
        sync: false
      - key: ALGOLIA_API_KEY
        sync: false
      - key: ALGOLIA_SEARCH_KEY
        sync: false

databases:
  - name: moxe-db
    databaseName: moxe
    user: moxe

